<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Association Sportive — Inscription / Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" role="main" aria-labelledby="title">
    <div class="hero">
      <div class="brand">
        <div class="logo">AS</div>
        <div>
          <h2 id="title" style="margin:0">Association Sportive</h2>
          <div style="font-size:13px;opacity:.95">Bienvenue — Rejoignez-nous !</div>
        </div>
      </div>
      <h1>Sport, esprit d'équipe et convivialité</h1>
      <p>Inscrivez-vous pour participer aux événements, gérer votre profil et suivre les activités du club.</p>
    </div>

    <div class="panel">
      <div id="forms">
        <div class="switch">
          <div style="display:flex;gap:8px">
            <button id="btn-login" class="alt">Connexion</button>
            <button id="btn-register">Inscription</button>
          </div>
          <div class="small">Couleurs : rouge & blanc</div>
        </div>

        <!-- === FORMULAIRE CONNEXION === -->
    <form id="login-form" onsubmit="return authSignIn(event)">
  <input id="login-email" type="email" required />
  <input id="login-password" type="password" required />
  <button type="submit">Se connecter</button>
</form>
        </div>

        <!-- === FORMULAIRE INSCRIPTION (COMPLET) === -->
        <div id="register-form">
            <form action="register.php" method="post">
    <input type="text" name="nom" placeholder="Nom" required><br>
    <input type="text" name="prenom" placeholder="Prénom" required><br>
    <input type="text" name="adresse" placeholder="Adresse" required><br>
    <input type="text" name="tel_portable" placeholder="Téléphone portable"><br>
    <input type="text" name="tel_fixe" placeholder="Téléphone fixe"><br>
    <input type="email" name="email" placeholder="Email" required><br>
    <input type="password" name="mdp" placeholder="Mot de passe" required><br>
    <button type="submit">S'inscrire</button>
  </form>
        </div>

        <div id="message" style="margin-top:12px"></div>
      </div>
  <script src="script.js"></script>
</body>
</html>
